<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#ece6dc">
    <title>Página no encontrada · Arquitectura Metálica</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body { background: var(--color-bg-deep); }
        .nf-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 96px 24px;
            position: relative;
        }
        .nf-code {
            font-family: var(--font-display);
            font-size: clamp(7rem, 22vw, 16rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.04em;
            color: var(--color-ink);
            margin: 0;
            background: linear-gradient(180deg, var(--color-orange) 0%, var(--color-teal-dark) 100%);
            -webkit-background-clip: text;
                    background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nf-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--color-teal-dark);
            margin: 16px 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .nf-tag::before { content: '—'; color: var(--color-teal-dark); }
        .nf-title {
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 4vw, 2.75rem);
            font-weight: 800;
            color: var(--color-ink);
            margin: 0 0 16px;
            letter-spacing: -0.02em;
            line-height: 1.15;
        }
        .nf-desc {
            font-size: 17px;
            color: var(--color-ink-muted);
            max-width: 520px;
            margin: 0 auto 36px;
            line-height: 1.7;
        }
        .nf-actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .nf-back {
            margin-top: 40px;
            font-size: 13px;
            color: var(--color-ink-faint);
            letter-spacing: 0.04em;
        }
        .nf-back a {
            color: var(--color-ink-muted);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 3px;
        }
        .nf-back a:hover { color: var(--color-orange); }
    </style>
</head>
<body>
    <main class="nf-wrap">
        <h1 class="nf-code">404</h1>
        <span class="nf-tag">Página no encontrada</span>
        <h2 class="nf-title">Esta ruta no existe</h2>
        <p class="nf-desc">
            La página que buscas pudo haber sido movida, eliminada,
            o quizá nunca existió. Volvamos a terreno conocido.
        </p>
        <div class="nf-actions">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home" aria-hidden="true"></i> Ir al Inicio
            </a>
            <a href="/#contacto" class="btn btn-outline">
                <i class="fas fa-envelope" aria-hidden="true"></i> Contáctenos
            </a>
        </div>
        <p class="nf-back">
            o regresa a <a href="javascript:history.back()">la página anterior</a>
        </p>
    </main>
</body>
</html>
